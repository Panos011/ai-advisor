name: Weekly data refresh

on:
  schedule:
    - cron: "0 5 * * MON"  # every Monday at 05:00
  workflow_dispatch: # allow manual run

permissions:
  contents: write # needed so the action can commit back

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Git LFS install
        run: git lfs install

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{runner.os}}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          playwright install chromium
          playwright install-deps

      - name: Run scraper -> AI_tools.csv
        run: python Data_Collection2.py

      - name: Clean and build embeddings CSV
        run: python Data_Cleaning.py

      - name: Build FAISS index (OpenAI embeddings)
        run: python Index.py

      # ---------------- Safe commit & push step ----------------
      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage updated files
          git add AI_tools.csv Clean_AI_tools.csv Embeddings_AI_tools.csv index/

          # Commit only if there are changes
          if ! git diff --cached --quiet; then
            git commit -m "Weekly data refresh"
          else
            echo "No changes to commit"
          fi

          # Fetch the latest remote commits
          git fetch origin main

          # Rebase local commit on top of remote
          git rebase origin/main || git rebase --abort

          # Push changes to remote
          git push origin main
