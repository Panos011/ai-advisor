name: Weekly data refresh
on:
  schedule:
    - cron: "0 5 * * MON"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Git LFS install
        run: git lfs install

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install all dependencies
        run: |
          pip install --no-cache-dir -r requirements.txt
          pip install --no-cache-dir "pydantic>=2.0,<3.0"
          pip install --no-cache-dir "crawlee[playwright]>=0.6.0"
          pip install --no-cache-dir playwright "pyee>=11.1.0,<12.0.0"
          python -c "from playwright.sync_api import sync_playwright; print('playwright OK')"
          python -c "import crawlee; print('crawlee OK')"
          python -m playwright install chromium
          python -m playwright install-deps

      - name: Run scraper -> AI_tools.csv
        run: |
          ls -la *.py
          python futurepedia_scraper.py

      - name: Clean and build embeddings CSV
        run: python Data_Cleaning.py

      - name: Build FAISS index (OpenAI embeddings)
        run: python Index.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add AI_tools.csv Clean_AI_tools.csv Embeddings_AI_tools.csv index/
          if ! git diff --cached --quiet; then
            git commit -m "Weekly data refresh"
          else
            echo "No changes to commit"
          fi
          git fetch origin main
          git rebase origin/main || git rebase --abort
          git push origin main
